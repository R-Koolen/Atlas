name: Build & publish site image

# Pull-based deploy: GitHub bouwt en publiceert de image naar GHCR.
# De server haalt 'm zelf op (Watchtower). GitHub krijgt GEEN toegang tot de server.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege: alleen lezen van de repo + schrijven naar GHCR-packages.
permissions:
  contents: read
  packages: write

env:
  # ghcr.io/<owner>/<repo> — automatisch lowercased eigenaar
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # NB: voor strengste supply-chain-veiligheid pin je deze actions op een
      # volledige commit-SHA i.p.v. een tag. Dependabot (.github/dependabot.yml)
      # houdt ze actueel. Major-tags worden hier gebruikt voor leesbaarheid.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in bij GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # 1) Bouw de image lokaal (nog niet pushen) zodat we hem kunnen scannen.
      - name: Bouw image (lokaal voor scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          load: true
          tags: ${{ env.IMAGE }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2) Scan op bekende kwetsbaarheden; faal de build bij HIGH/CRITICAL.
      - name: Trivy image-scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # 3) Pas na een schone scan: pushen (gebruikt de build-cache, dus snel).
      - name: Push naar GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
